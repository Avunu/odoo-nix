[project]
name = "@PROJECT_NAME@"
version = "0.1.0"
description = "Odoo (OCB) + OCA project managed by odoo-nix"
requires-python = "@REQUIRES_PYTHON@"
readme = "README.md"

# Install roots: OCB `odoo` + the modules from modules.txt as odoo-addon-<name>.
# This block is auto-generated from modules.txt by `odoo-add-module` /
# `odoo-add-bundle` / `odoo-update` (lib/oca_sources.py) — do not edit by hand.
dependencies = [
    # >>> odoo-nix: install set (managed from modules.txt) >>>
    # <<< odoo-nix: install set <<<
]

[dependency-groups]
dev = [
    "debugpy",
    "ruff",
]

[tool.uv]
# Single virtual project; the modules load via addons_path, but each is declared
# as an editable path source below so uv resolves the full dependency graph
# (every module's external_dependencies.python + Odoo's own requirements).
package = false

# Editable path sources for OCB `odoo` + every local OCA/custom module. Modules
# are modern whool packages whose metadata declares their deps; uv reads them.
# Auto-generated (lib/oca_sources.py) — do not edit by hand.
[tool.uv.sources]
# >>> odoo-nix: module sources (managed) >>>
# <<< odoo-nix: module sources <<<

# The root is a virtual package with no Python code of its own.
[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = []

# Legacy sdist-only deps (from Odoo's requirements) that don't declare setuptools
# as a build dependency. Auto-maintained from uv.lock (lib/uv_build_deps.py).
[tool.uv.extra-build-dependencies]
# >>> odoo-nix: sdist build deps (managed) >>>
# <<< odoo-nix: sdist build deps (managed) <<<
